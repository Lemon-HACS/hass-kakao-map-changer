<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0}
html,body,#map{width:100%;height:100%}
#traffic-btn{
  position:absolute;top:10px;left:10px;z-index:10;
  padding:7px 14px;border:none;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;
  background:#fff;color:#333;
  box-shadow:0 1px 4px rgba(0,0,0,.25);
  transition:background .15s,color .15s;
}
#traffic-btn:hover{background:#f5f5f5}
#traffic-btn.active{background:#4285f4;color:#fff}
#traffic-btn.active:hover{background:#3367d6}
</style>
</head>
<body>
<div id="map"></div>
<button id="traffic-btn" title="교통 정보">🚦 교통</button>
</body>
</html>
