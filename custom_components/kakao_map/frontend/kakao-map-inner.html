<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#map{width:100%;height:100%}

.ctrl-btn{
  position:absolute;z-index:10;
  padding:7px 14px;border:none;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;
  background:#fff;color:#333;
  box-shadow:0 1px 4px rgba(0,0,0,.25);
  transition:background .15s,color .15s;
}
.ctrl-btn:hover{background:#f5f5f5}
.ctrl-btn.active{background:#4285f4;color:#fff}
.ctrl-btn.active:hover{background:#3367d6}

#traffic-btn{top:10px;left:10px}

#search-box{
  position:absolute;top:10px;left:90px;z-index:10;
  display:flex;gap:4px;
}
#search-input{
  width:220px;padding:7px 12px;border:none;border-radius:8px;
  font-size:13px;background:#fff;color:#333;
  box-shadow:0 1px 4px rgba(0,0,0,.25);outline:none;
}
#search-input::placeholder{color:#999}
#search-btn{
  padding:7px 12px;border:none;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;
  background:#fee500;color:#333;
  box-shadow:0 1px 4px rgba(0,0,0,.25);
}
#search-btn:hover{background:#fdd800}

#search-results{
  position:absolute;top:44px;left:90px;z-index:10;
  width:320px;max-height:360px;overflow-y:auto;
  background:#fff;border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
  display:none;
}
.result-item{
  padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;
}
.result-item:last-child{border-bottom:none}
.result-item:hover{background:#f8f9fa}
.result-name{font-size:14px;font-weight:600;color:#333}
.result-addr{font-size:12px;color:#888;margin-top:2px}
.result-category{font-size:11px;color:#4285f4;margin-top:2px}
.result-link{
  display:inline-block;margin-top:4px;
  font-size:11px;color:#fee500;background:#333;
  padding:2px 8px;border-radius:4px;text-decoration:none;
}
.result-link:hover{background:#555}
.result-close{
  padding:8px 14px;text-align:center;cursor:pointer;
  font-size:12px;color:#999;border-top:1px solid #eee;
}
.result-close:hover{background:#f8f9fa;color:#333}
</style>
</head>
<body>
<div id="map"></div>
<button id="traffic-btn" class="ctrl-btn" title="교통 정보">🚦 교통</button>
<div id="search-box">
  <input id="search-input" type="text" placeholder="장소 검색...">
  <button id="search-btn">검색</button>
</div>
<div id="search-results"></div>
</body>
</html>
